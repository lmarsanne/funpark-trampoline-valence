    <script>

                              window.dataLayer = window.dataLayer || [];

                              const pushed = new Set();

                              function decodeGPath() {
                                const u = new URL(location.href);
                                const g = u.searchParams.get("g-path");
                                if (!g) return "";
                                try { return decodeURIComponent(g); } catch(e) { return g; }
                              }

                              function mapEventFromGPath(gPath) {
                                // Adapte les "includes" après observation réelle des g-path
                                if (gPath.includes("/cart/add-to-cart")) return "guidap_add_to_cart";
                                if (gPath.includes("/checkout")) return "guidap_begin_checkout";
                                if (gPath.includes("/payment")) return "guidap_add_payment_info";
                                if (gPath.includes("/confirmation") || gPath.includes("/success")) return "guidap_purchase";
                                return null;
                              }

                              function pushIfNeeded() {
                                console.log("Push function");
                                const gPath = decodeGPath();

                                  console.log("vide");
          return;

                                }

                                const ev = mapEventFromGPath(gPath);
                                if (!ev) return;

                                const key = ev + "::" + location.href;

                                console.log(key);

                                if (pushed.has(key)) return;
                                pushed.add(key);

                                window.dataLayer.push({
                                  event: ev,
                                  guidap_g_path: gPath,
                                  guidap_url: location.href
                                });
                              }

                              // Hook SPA changes
                              const _pushState = history.pushState;
                              history.pushState = function () { _pushState.apply(this, arguments); pushIfNeeded(); };
