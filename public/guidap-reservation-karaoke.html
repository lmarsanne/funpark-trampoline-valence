    <!-- Guidap g-path tracking for ecommerce events -->
    <script>
      (function () {
        window.dataLayer = window.dataLayer || [];
        var pushed = new Set();
        var storedOrderValue = 0;

        function parsePrice(raw) {
          if (!raw) return 0;
          var cleaned = raw.replace(/[^0-9,.]/g, '').replace(',', '.');
          var val = parseFloat(cleaned);
          return isNaN(val) ? 0 : val;
        }

        function decodeGPath() {
          var u = new URL(location.href);
          var g = u.searchParams.get("g-path");
          if (!g) return "";
          try { return decodeURIComponent(g); } catch(e) { return g; }
        }

        function mapEventFromGPath(gPath) {
          if (gPath.includes("/cart/add-to-cart")) return "guidap_add_to_cart";
          if (gPath.includes("/checkout")) return "guidap_begin_checkout";
          if (gPath.includes("/payment")) return "guidap_add_payment_info";
          if (gPath.includes("/confirmation") || gPath.includes("/success")) return "guidap_purchase";
          return null;
        }

        function pushIfNeeded() {
          var gPath = decodeGPath();
          if (!gPath) return;
          var ev = mapEventFromGPath(gPath);
          if (!ev) return;
          var key = ev + "::" + location.href;
          if (pushed.has(key)) return;
          pushed.add(key);

          var payload = {
            event: ev,
            guidap_g_path: gPath,
            guidap_url: location.href
          };

          // On purchase confirmation: push GA4 ecommerce data for ROAS
          if (ev === "guidap_purchase") {
            var txnId = "txn_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6);
            payload.ecommerce = {
              transaction_id: txnId,
              value: storedOrderValue,
              currency: "EUR",
              items: [{ item_name: "Reservation Guidap", quantity: 1, price: storedOrderValue }]
            };
            console.log("Purchase tracked: " + storedOrderValue + " EUR, txn: " + txnId);
          }

          window.dataLayer.push(payload);
        }

        // Hook SPA navigation
        var _ps = history.pushState;
        history.pushState = function () { _ps.apply(this, arguments); pushIfNeeded(); };
        var _rs = history.replaceState;
        history.replaceState = function () { _rs.apply(this, arguments); pushIfNeeded(); };
        window.addEventListener("popstate", pushIfNeeded);

        // Click-based Guidap step tracking
        document.addEventListener("click", function (event) {
          var target = event.target;
          if (target.tagName !== "BUTTON" && target.tagName !== "SPAN") return;
          var isGButton = false;
          if (target.tagName === "BUTTON" && target.classList.contains("g-button")) isGButton = true;
          else if (target.tagName === "SPAN" && target.closest("button.g-button")) isGButton = true;
          if (!isGButton) return;

          var eventDataLayer = "";
          var totalCommande = "";

          if (document.querySelectorAll(".step-cart-title").length > 0) {
            // panier affiché
          } else if (document.querySelectorAll(".step-customer-title").length > 0) {
            eventDataLayer = "valide_info_client";
          } else if (document.querySelectorAll(".finalize-order-page-countdown").length > 0) {
            eventDataLayer = "paiement_clic";
            var priceEl = document.querySelector(".cart-recap-bottom-price");
            totalCommande = priceEl ? priceEl.textContent.trim() : "0";
            storedOrderValue = parsePrice(totalCommande);
            console.log("Prix capture: " + storedOrderValue + " EUR (raw: " + totalCommande + ")");
          } else if (document.querySelectorAll(".gdp-fix-datepicker").length > 0) {
            eventDataLayer = "ajout_panier";
          } else if (document.querySelectorAll(".reservation-recap-desktop-total").length > 0) {
            eventDataLayer = "reserver_choix_activite";
          }

          if (eventDataLayer !== "") {
            window.dataLayer.push({
              event: eventDataLayer,
              guidap_g_path: location.href,
              guidap_url: location.href,
              totalCommande: totalCommande
            });
          }
        });

        // Confirmation page on load
        if (document.querySelectorAll(".finalize-order-page").length > 0) {
          window.dataLayer.push({
            event: "confirmation_commande",
            guidap_g_path: location.href,
            guidap_url: location.href
          });
        }

        pushIfNeeded();
      })();
    </script>
